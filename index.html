<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Consulting Toolkit</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b1a33;
        color: white;
        text-align: center;
    }

    header {
        padding: 30px;
        background: #0e2347;
        font-size: 28px;
        font-weight: bold;
    }

    .container {
        margin-top: 40px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .btn {
        background: #1f4ba8;
        padding: 18px 28px;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        color: white;
        font-size: 18px;
        width: 280px;
        transition: 0.2s;
    }

    .btn:hover {
        background: #2f6bff;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        z-index: 10;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.75);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #10294d;
        padding: 25px;
        width: 90%;
        max-width: 700px;
        border-radius: 10px;
        text-align: left;
        max-height: 90vh;
        overflow-y: auto;
    }

    .modal h2 {
        margin-top: 0;
        color: #7ab4ff;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    textarea {
        width: 100%;
        height: 70px;
        margin-top: 5px;
        border-radius: 6px;
        border: none;
        padding: 10px;
        font-size: 14px;
    }

    .close {
        background: #ff4b4b;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        margin-top: 20px;
    }
</style>

<script>
function openForm(id) {
    document.getElementById(id).style.display = "flex";
}

function closeForm(id) {
    document.getElementById(id).style.display = "none";
}
</script>

</head>
<body>

<header>Consulting Toolkit</header>

<div class="container">
    <button class="btn" onclick="openForm('form1')">Support Operating Model</button>
    <button class="btn" onclick="openForm('form2')">Business Case Builder</button>
    <button class="btn" onclick="openForm('form3')">Process Maturity Assessment</button>
    <button class="btn" onclick="openForm('form4')">Requirements Gathering</button>
    <button class="btn" onclick="openForm('form5')">Risk & Compliance Assessment</button>
    <button class="btn" onclick="openForm('form6')">Governance Framework</button>
</div>

<!-- FORM 1 -->
<div class="modal" id="form1">
    <div class="modal-content">
        <h2>Design a Support Operating Model</h2>

        <label>1. What is the name and purpose of the software product?</label><textarea></textarea>
        <label>2. Who are the primary users or customer segments?</label><textarea></textarea>
        <label>3. What support channels do you currently offer?</label><textarea></textarea>
        <label>4. What are the main support issues or pain points today?</label><textarea></textarea>
        <label>5. What service levels or response times do you expect?</label><textarea></textarea>
        <label>6. What teams or roles currently handle support?</label><textarea></textarea>
        <label>7. Any compliance, security, or regulatory requirements?</label><textarea></textarea>
        <label>8. What tools/platforms do you use?</label><textarea></textarea>
        <label>9. What volume of support requests do you handle?</label><textarea></textarea>
        <label>10. What does “great support” look like in the future?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form1')">Close</button>
    </div>
</div>

<!-- FORM 2 -->
<div class="modal" id="form2">
    <div class="modal-content">
        <h2>Create a Business Case</h2>

        <label>1. What is the idea or initiative?</label><textarea></textarea>
        <label>2. What problem does it solve?</label><textarea></textarea>
        <label>3. Expected benefits?</label><textarea></textarea>
        <label>4. Expected costs?</label><textarea></textarea>
        <label>5. Expected timeline?</label><textarea></textarea>
        <label>6. Risks or uncertainties?</label><textarea></textarea>
        <label>7. Alternatives considered?</label><textarea></textarea>
        <label>8. Key stakeholders?</label><textarea></textarea>
        <label>9. Metrics or KPIs?</label><textarea></textarea>
        <label>10. Key assumptions?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form2')">Close</button>
    </div>
</div>

<!-- FORM 3 -->
<div class="modal" id="form3">
    <div class="modal-content">
        <h2>Process Maturity Assessment</h2>

        <label>1. Which process is being assessed?</label><textarea></textarea>
        <label>2. Main steps in the current process?</label><textarea></textarea>
        <label>3. Who performs each step?</label><textarea></textarea>
        <label>4. Tools or systems used?</label><textarea></textarea>
        <label>5. Biggest pain points?</label><textarea></textarea>
        <label>6. Data or metrics tracked?</label><textarea></textarea>
        <label>7. Process consistency?</label><textarea></textarea>
        <label>8. Controls or approvals?</label><textarea></textarea>
        <label>9. Existing strengths?</label><textarea></textarea>
        <label>10. Ideal future state?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form3')">Close</button>
    </div>
</div>

<!-- FORM 4 -->
<div class="modal" id="form4">
    <div class="modal-content">
        <h2>Requirements Gathering</h2>

        <label>1. What product/system is this for?</label><textarea></textarea>
        <label>2. Key user groups?</label><textarea></textarea>
        <label>3. Top user problems?</label><textarea></textarea>
        <label>4. Known functional requirements?</label><textarea></textarea>
        <label>5. Non-functional requirements?</label><textarea></textarea>
        <label>6. Regulatory/compliance needs?</label><textarea></textarea>
        <label>7. Required integrations?</label><textarea></textarea>
        <label>8. Constraints?</label><textarea></textarea>
        <label>9. Prioritisation method?</label><textarea></textarea>
        <label>10. Success for MVP?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form4')">Close</button>
    </div>
</div>

<!-- FORM 5 -->
<div class="modal" id="form5">
    <div class="modal-content">
        <h2>Risk & Compliance Assessment</h2>

        <label>1. What area is being assessed?</label><textarea></textarea>
        <label>2. Applicable regulations?</label><textarea></textarea>
        <label>3. Known risks or incidents?</label><textarea></textarea>
        <label>4. Existing controls?</label><textarea></textarea>
        <label>5. Risk/control owners?</label><textarea></textarea>
        <label>6. Tools supporting compliance?</label><textarea></textarea>
        <label>7. Biggest uncertainties?</label><textarea></textarea>
        <label>8. Impact if risk occurs?</label><textarea></textarea>
        <label>9. Control testing frequency?</label><textarea></textarea>
        <label>10. Organisation’s risk tolerance?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form5')">Close</button>
    </div>
</div>

<!-- FORM 6 -->
<div class="modal" id="form6">
    <div class="modal-content">
        <h2>Governance & Delivery Framework</h2>

        <label>1. What project/programme/product?</label><textarea></textarea>
        <label>2. Key stakeholders?</label><textarea></textarea>
        <label>3. Decisions requiring governance?</label><textarea></textarea>
        <label>4. Preferred delivery methodology?</label><textarea></textarea>
        <label>5. Meeting cadence?</label><textarea></textarea>
        <label>6. Roles & responsibilities?</label><textarea></textarea>
        <label>7. Reporting or dashboards?</label><textarea></textarea>
        <label>8. Risks/issues/dependencies?</label><textarea></textarea>
        <label>9. Approval gates?</label><textarea></textarea>
        <label>10. What does effective governance look like?</label><textarea></textarea>

        <button class="close" onclick="closeForm('form6')">Close</button>
    </div>
</div>

</body>
</html>
