<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>kpmGO</title>
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #0b0f19;
        color: white;
        text-align: center;
    }
    header {
        padding: 40px 20px;
        background: #0b0f19;
    }
    header img {
        height: 120px;
        object-fit: contain;
        filter: drop-shadow(0 0 25px rgba(80,120,255,0.35));
    }
    .container {
        margin: 40px auto 80px auto;
        width: 90%;
        max-width: 1500px;
        display: grid;
        grid-template-columns: repeat(3, minmax(280px, 1fr));
        gap: 40px;
    }
    .btn {
        background: #1c2f4d;
        border-radius: 20px;
        cursor: pointer;
        border: none;
        color: white;
        font-size: 26px;
        font-weight: 600;
        transition: 0.25s;
        position: relative;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
    }
    .btn:hover {
        background: #2f4f80;
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    }
    .btn span {
        position: absolute;
        width: 90%;
        text-align: center;
        padding: 0 20px;
        transition: opacity 0.25s ease;
    }
    .btn .label { opacity: 1; }
    .btn .desc {
        opacity: 0;
        font-size: 20px;
        line-height: 1.3;
    }
    .btn:hover .label { opacity: 0; }
    .btn:hover .desc { opacity: 1; }
    .modal {
        display: none;
        position: fixed;
        z-index: 20;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.75);
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
    }
    .modal-content {
        background: #162238;
        padding: 34px;
        width: 95%;
        max-width: 900px;
        border-radius: 18px;
        text-align: left;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        box-shadow: 0 0 40px rgba(0,0,0,0.6);
        box-sizing: border-box;
    }
    .modal h2 {
        margin-top: 0;
        margin-right: 40px;
        color: #9bc7ff;
        font-size: 28px;
        line-height: 1.25;
    }
    .close-x {
        position: absolute;
        top: 18px;
        right: 22px;
        font-size: 30px;
        cursor: pointer;
        color: #ff6b6b;
        font-weight: bold;
        line-height: 1;
    }
    .close-x:hover { color: #ff3d3d; }
    .progress-wrapper {
        margin: 22px 0 10px 0;
        background: #243653;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #4f8cff, #9bc7ff);
        border-radius: 999px;
        transition: width 0.25s ease;
    }
    .question-count {
        color: #b9d7ff;
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 22px;
    }
    .question-title {
        display: block;
        margin-top: 10px;
        margin-bottom: 14px;
        font-weight: bold;
        font-size: 19px;
        line-height: 1.35;
        color: white;
    }
    .options {
        margin-top: 8px;
        margin-bottom: 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(220px, 1fr));
        gap: 8px 18px;
    }
    .options label {
        font-weight: normal;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 15px;
        line-height: 1.3;
        color: #edf4ff;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px;
        padding: 10px;
        cursor: pointer;
    }
    .options label:hover {
        background: rgba(155,199,255,0.10);
        border-color: rgba(155,199,255,0.25);
    }
    .options input { margin-top: 2px; }
    textarea {
        width: 100%;
        min-height: 110px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        padding: 14px;
        font-size: 15px;
        background: #e8eefc;
        color: #111827;
        box-sizing: border-box;
        resize: vertical;
        font-family: inherit;
    }
    textarea:focus { outline: 3px solid rgba(155,199,255,0.5); }
    .ai-status {
        margin-top: 18px;
        padding: 14px;
        background: rgba(155,199,255,0.10);
        border: 1px solid rgba(155,199,255,0.25);
        border-radius: 12px;
        color: #dcecff;
        font-size: 15px;
        line-height: 1.4;
        display: none;
    }
    .ai-output {
        margin-top: 22px;
        padding: 22px;
        background: #0f172a;
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 14px;
        color: #f8fafc;
        line-height: 1.55;
        white-space: pre-wrap;
        display: none;
    }
    .copy-output-btn {
        margin-top: 16px;
        background: #4f8cff;
        color: white;
        border: none;
        border-radius: 9px;
        padding: 11px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: none;
    }
    .copy-output-btn:hover { background: #2f6fed; }
    .wizard-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        margin-top: 28px;
        border-top: 1px solid rgba(255,255,255,0.12);
        padding-top: 20px;
    }
    .wizard-nav-right { display: flex; gap: 12px; }
    .wizard-nav button {
        padding: 12px 22px;
        border: none;
        border-radius: 9px;
        color: white;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: 0.2s;
    }
    .close-btn { background: #ff4b4b; }
    .close-btn:hover { background: #ff2e2e; }
    .back-btn { background: #3b4d6b; }
    .back-btn:hover { background: #4c6388; }
    .next-btn { background: #2f6fed; }
    .next-btn:hover { background: #1f5ed6; }
    .finish-btn { background: #28a745; }
    .finish-btn:hover { background: #218838; }
    .wizard-nav button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }
    @media (max-width: 1100px) {
        .container { grid-template-columns: repeat(2, minmax(260px, 1fr)); }
    }
    @media (max-width: 700px) {
        .container { grid-template-columns: 1fr; }
        .btn { height: 180px; font-size: 24px; }
        .modal-content { padding: 26px; }
        .modal h2 { font-size: 23px; }
        .options { grid-template-columns: 1fr; }
        .wizard-nav { flex-direction: column; align-items: stretch; }
        .wizard-nav-right { width: 100%; }
        .wizard-nav button { width: 100%; }
    }
</style>
</head>
<body>
<header>
    <img src="KPMG_blue_logo.svg.png" alt="kpmGO Logo">
</header>
<div class="container">
    <button class="btn" onclick="openForm('supportModel')"><span class="label">Support Model</span><span class="desc">Design a support operating model for your software product</span></button>
    <button class="btn" onclick="openForm('businessCase')"><span class="label">Business Case</span><span class="desc">Build a structured business case with benefits, costs, risks, and assumptions</span></button>
    <button class="btn" onclick="openForm('maturityAssessment')"><span class="label">Maturity Assessment</span><span class="desc">Assess process maturity, pain points, tools, and improvement opportunities</span></button>
    <button class="btn" onclick="openForm('requirements')"><span class="label">Gather Requirements</span><span class="desc">Capture and prioritise functional and non-functional requirements</span></button>
    <button class="btn" onclick="openForm('riskAssessment')"><span class="label">Risk Assessment</span><span class="desc">Evaluate risks, controls, compliance obligations, and risk tolerance</span></button>
    <button class="btn" onclick="openForm('governance')"><span class="label">Governance Framework</span><span class="desc">Define governance, roles, cadence, reporting, and decision rights</span></button>
</div>
<div class="modal" id="wizardModal">
    <div class="modal-content">
        <div class="close-x" onclick="closeForm()">×</div>
        <h2 id="modalTitle"></h2>
        <div class="progress-wrapper"><div class="progress-bar" id="progressBar"></div></div>
        <div class="question-count" id="questionCount"></div>
        <div id="questionArea"></div>
        <div class="ai-status" id="aiStatus"></div>
        <div class="ai-output" id="aiOutput"></div>
        <button class="copy-output-btn" id="copyOutputBtn" type="button" onclick="copyAiOutput()">Copy output</button>
        <div class="wizard-nav">
            <button class="close-btn" type="button" onclick="closeForm()">Close</button>
            <div class="wizard-nav-right">
                <button class="back-btn" type="button" id="backBtn" onclick="previousQuestion()">Back</button>
                <button class="next-btn" type="button" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>
    </div>
</div>
<script>
const forms = {
    supportModel: {
        title: "Design a Support Operating Model for Your Software Product",
        questions: [
            { text: "What is the name and purpose of the software product?", placeholder: "Describe the name and purpose...", options: [] },
            { text: "Who are the primary users or customer segments?", placeholder: "More info about user segments...", options: ["Internal employees", "Developers", "Accountants", "Lawyers", "Sales teams", "Customer service teams", "Executives", "Vendors / partners", "External customers", "SMEs / small businesses", "Enterprise clients", "Students", "Government agencies", "Contractors", "Field technicians"] },
            { text: "What support channels do you currently offer?", placeholder: "More info about support channels...", options: ["Email", "Phone", "Live chat", "In-app support", "Self-service portal", "Knowledge base", "Community forum", "Social media", "Chatbot", "On-site support"] },
            { text: "What are the main support issues or pain points today?", placeholder: "More info about pain points...", options: ["Slow response times", "High ticket volume", "Poor documentation", "Lack of ownership", "Repeated issues", "Escalations unclear", "Missing SLAs", "Tooling limitations", "Knowledge gaps", "Poor customer satisfaction"] },
            { text: "What service levels or response times do you expect to meet?", placeholder: "More info about SLAs and expectations...", options: ["15 minutes", "1 hour", "4 hours", "Same business day", "Next business day", "Severity-based SLAs", "24/7 coverage", "Business hours only"] },
            { text: "What teams or roles currently handle support activities?", placeholder: "More info about teams and roles...", options: ["Product team", "Engineering", "QA / testing", "Customer support", "Service desk", "DevOps", "Security", "Vendor support", "Operations", "Business analysts"] },
            { text: "Are there any compliance, security, or regulatory requirements?", placeholder: "More info about compliance and security...", options: ["GDPR", "ISO 27001", "SOC 2", "HIPAA", "PCI-DSS", "Local privacy laws", "Industry-specific regulations", "Internal security policies"] },
            { text: "What tools or platforms do you use for support?", placeholder: "More info about tools and platforms...", options: ["Jira Service Management", "ServiceNow", "Zendesk", "Freshdesk", "Salesforce Service Cloud", "Intercom", "Microsoft Dynamics", "Confluence", "PagerDuty", "Slack / Teams"] },
            { text: "What volume of support requests do you handle?", placeholder: "More info about volumes and patterns...", options: ["<50 per month", "50–200 per month", "200–500 per month", "500–1,000 per month", "1,000–5,000 per month", "5,000+ per month"] },
            { text: "What does “great support” look like for your product?", placeholder: "More info about your vision of great support...", options: ["Fast response", "High first-contact resolution", "Clear ownership", "Proactive communication", "Strong documentation", "Predictable SLAs", "Personalised support", "Automation and self-service"] }
        ]
    },
    businessCase: {
        title: "Create a Business Case for Your Idea",
        questions: [
            { text: "What is the idea, initiative, or product you want to justify?", placeholder: "Describe the idea, initiative, or product...", options: [] },
            { text: "What problem does it solve, and for whom?", placeholder: "More info about the problem and audience...", options: ["Reduce cost", "Improve efficiency", "Increase revenue", "Improve customer experience", "Reduce risk", "Enable compliance", "Improve data quality", "Modernise technology", "Expand market reach"] },
            { text: "What are the expected benefits, financial, operational, customer, or strategic?", placeholder: "More info about expected benefits...", options: ["Cost savings", "Revenue growth", "Productivity gains", "Customer satisfaction", "Risk reduction", "Faster delivery", "Better decision-making", "Improved compliance", "Reduced manual work"] },
            { text: "What costs do you anticipate, including people, technology, vendors, change, and operations?", placeholder: "More info about cost assumptions...", options: ["Technology / software", "Hardware", "External vendors", "Internal labour", "Training", "Change management", "Licensing", "Ongoing operations", "Infrastructure"] },
            { text: "What is the expected timeline for delivery and value realisation?", placeholder: "More info about timeline and phases...", options: ["<3 months", "3–6 months", "6–12 months", "12–18 months", "18–24 months", "24+ months"] },
            { text: "What risks or uncertainties could impact the business case?", placeholder: "More info about risks and uncertainties...", options: ["Budget overruns", "Technical complexity", "Vendor dependency", "Low adoption", "Regulatory changes", "Data quality issues", "Integration challenges", "Skills shortages"] },
            { text: "What alternatives have you considered, including “do nothing”?", placeholder: "More info about alternatives and trade-offs...", options: ["Do nothing", "Build in-house", "Buy off-the-shelf", "Outsource", "Partner with vendor", "Phased implementation"] },
            { text: "Who are the key stakeholders and decision-makers?", placeholder: "More info about stakeholder roles and interests...", options: ["CEO", "CIO / CTO", "CFO", "COO", "Product owners", "IT leadership", "Operations", "Finance", "Legal", "HR", "Customers"] },
            { text: "What metrics or KPIs will define success?", placeholder: "More info about success metrics...", options: ["ROI", "NPV", "Payback period", "Cost reduction %", "Revenue uplift %", "Customer satisfaction", "SLA improvements", "Cycle time reduction"] },
            { text: "What assumptions underpin your estimates, such as adoption, growth, or cost savings?", placeholder: "More info about key assumptions...", options: ["Adoption rate", "Cost inflation", "Market growth", "Productivity uplift", "Vendor pricing", "Resource availability"] }
        ]
    },
    maturityAssessment: {
        title: "Assess the Current State and Maturity of Your Processes",
        questions: [
            { text: "Which process or process area do you want to assess?", placeholder: "More info about the process scope...", options: ["Procurement", "Finance", "HR", "IT service management", "Customer onboarding", "Sales", "Billing", "Risk management", "Compliance", "Product development"] },
            { text: "What are the main steps in the current process?", placeholder: "Describe the main steps in the current process...", options: [] },
            { text: "Who performs each step, including roles, teams, or vendors?", placeholder: "More info about roles and responsibilities...", options: ["Process owner", "Analysts", "Managers", "Frontline staff", "Vendors", "Shared services", "Finance team", "IT team", "Operations team"] },
            { text: "What tools or systems support the process today?", placeholder: "More info about tools and integrations...", options: ["SAP", "Oracle", "Workday", "Salesforce", "Jira", "ServiceNow", "Excel", "Custom applications", "Email"] },
            { text: "What are the biggest pain points, delays, or inefficiencies?", placeholder: "More info about pain points...", options: ["Manual work", "Delays", "Errors", "Lack of visibility", "Poor data quality", "Too many handoffs", "System limitations", "Lack of ownership", "Compliance gaps"] },
            { text: "What data or metrics do you currently track for this process?", placeholder: "More info about metrics and data...", options: ["Cycle time", "Error rate", "SLA performance", "Cost per transaction", "Volume processed", "Backlog size", "Customer satisfaction", "Compliance breaches"] },
            { text: "How consistent is the process across teams or regions?", placeholder: "More info about consistency and variations...", options: ["Fully standardised", "Mostly standardised", "Partially standardised", "Highly variable", "No standardisation"] },
            { text: "What controls, checks, or approvals exist today?", placeholder: "More info about controls and approvals...", options: ["Manager approvals", "Segregation of duties", "Automated controls", "Manual checks", "Audit trails", "Exception reporting"] },
            { text: "What good practices or strengths already exist?", placeholder: "More info about strengths...", options: ["Skilled team", "Good documentation", "Strong tools", "Clear ownership", "High compliance", "Good customer feedback"] },
            { text: "What does an improved or “ideal” version of this process look like?", placeholder: "More info about the ideal future state...", options: ["Automated", "Standardised", "Low-touch", "Real-time data", "Clear ownership", "High compliance", "Customer-centric"] }
        ]
    },
    requirements: {
        title: "Gather and Prioritise Requirements",
        questions: [
            { text: "What is the product, system, or capability you are gathering requirements for?", placeholder: "Describe the product, system, or capability...", options: [] },
            { text: "Who are the key user groups or personas?", placeholder: "More info about user groups...", options: ["Customers", "Internal staff", "Managers", "Executives", "Vendors", "Partners", "Developers", "Analysts", "Field workers"] },
            { text: "What are the top problems users need solved?", placeholder: "More info about user problems...", options: ["Slow processes", "Poor visibility", "Manual work", "Errors", "Poor customer experience", "Lack of integration", "Compliance issues", "Outdated tools"] },
            { text: "What functional requirements do you already know about?", placeholder: "More info about functional requirements...", options: ["Data entry", "Reporting", "Workflow automation", "Notifications", "Integrations", "Role-based access", "Dashboards", "Search functionality"] },
            { text: "What non-functional requirements matter most, such as performance, security, or scalability?", placeholder: "More info about non-functional requirements...", options: ["Performance", "Scalability", "Security", "Availability", "Usability", "Accessibility", "Maintainability", "Disaster recovery"] },
            { text: "Are there any regulatory or compliance requirements?", placeholder: "More info about regulatory requirements...", options: ["GDPR", "SOC 2", "HIPAA", "PCI-DSS", "Local privacy laws", "Industry-specific rules"] },
            { text: "What integrations with other systems are needed?", placeholder: "More info about integrations...", options: ["CRM", "ERP", "HRIS", "Data warehouse", "Payment systems", "Identity management", "Email / messaging", "Analytics tools"] },
            { text: "What constraints exist, including budget, timeline, technology, or architecture?", placeholder: "More info about constraints...", options: ["Budget", "Timeline", "Legacy systems", "Architecture", "Skills", "Vendor lock-in"] },
            { text: "How will you prioritise requirements, such as MoSCoW or value versus effort?", placeholder: "More info about prioritisation approach...", options: ["MoSCoW", "Value vs effort", "Risk reduction", "Customer impact", "Compliance criticality", "Technical feasibility"] },
            { text: "What does success look like for the first release or MVP?", placeholder: "More info about MVP success criteria...", options: ["Basic functionality live", "Reduced manual work", "Faster processing", "Improved visibility", "Better user experience", "Compliance met"] }
        ]
    },
    riskAssessment: {
        title: "Conduct a Risk and Compliance Assessment",
        questions: [
            { text: "What process, system, or business area is being assessed?", placeholder: "More info about the area being assessed...", options: ["Finance", "HR", "IT", "Cybersecurity", "Procurement", "Operations", "Product", "Customer data", "Third-party management"] },
            { text: "What regulations or standards apply, including industry, regional, or internal requirements?", placeholder: "More info about applicable regulations...", options: ["GDPR", "ISO 27001", "SOC 2", "HIPAA", "PCI-DSS", "SOX", "Local privacy laws", "Industry-specific rules"] },
            { text: "What are the known risks or past incidents?", placeholder: "More info about risks and incidents...", options: ["Data breaches", "Fraud", "System outages", "Non-compliance", "Operational errors", "Vendor failures", "Financial misstatements", "Customer harm"] },
            { text: "What controls currently exist to mitigate risks?", placeholder: "More info about controls...", options: ["Access controls", "Segregation of duties", "Automated checks", "Manual reviews", "Audit logs", "Monitoring tools", "Policies and procedures"] },
            { text: "Who owns each risk or control?", placeholder: "More info about ownership...", options: ["Risk team", "IT", "Security", "Finance", "Operations", "Product", "Compliance", "Vendors"] },
            { text: "What tools or systems support compliance activities?", placeholder: "More info about compliance tooling...", options: ["GRC platforms", "Audit tools", "Monitoring systems", "Ticketing systems", "Document management", "Identity management"] },
            { text: "What are the biggest areas of uncertainty or concern?", placeholder: "More info about uncertainties and concerns...", options: ["Data security", "Regulatory changes", "Vendor risk", "Legacy systems", "Manual processes", "Lack of documentation", "Skills gaps"] },
            { text: "What is the impact if a risk materialises, including financial, operational, or reputational impact?", placeholder: "More info about impact...", options: ["Financial loss", "Reputational damage", "Legal penalties", "Customer churn", "Operational disruption", "Data loss"] },
            { text: "How frequently are controls tested or reviewed?", placeholder: "More info about review cadence...", options: ["Weekly", "Monthly", "Quarterly", "Annually", "Ad-hoc", "Never"] },
            { text: "What level of risk tolerance does the organisation have?", placeholder: "More info about risk appetite...", options: ["Very low", "Low", "Moderate", "High", "Very high"] }
        ]
    },
    governance: {
        title: "Form a Governance and Delivery Framework",
        questions: [
            { text: "What project, programme, or product is this governance for?", placeholder: "Describe the project, programme, or product...", options: [] },
            { text: "Who are the key stakeholders and decision-makers?", placeholder: "More info about stakeholders...", options: ["Sponsor", "Steering committee", "Product owner", "Delivery lead", "Architects", "Finance", "Legal", "Operations", "Vendors"] },
            { text: "What decisions need formal governance, such as scope, budget, design, or risks?", placeholder: "More info about decision areas...", options: ["Budget", "Scope", "Design", "Risks", "Timeline", "Vendor selection", "Architecture", "Change requests"] },
            { text: "What delivery methodology do you prefer, such as Agile, Waterfall, or Hybrid?", placeholder: "More info about methodology preferences...", options: ["Agile", "Scrum", "Kanban", "Waterfall", "Hybrid", "SAFe", "Lean"] },
            { text: "What cadence of meetings or ceremonies do you expect?", placeholder: "More info about meeting cadence...", options: ["Daily", "Twice weekly", "Weekly", "Fortnightly", "Monthly", "Quarterly"] },
            { text: "What roles and responsibilities need to be defined?", placeholder: "More info about roles and responsibilities...", options: ["Sponsor", "Product owner", "Scrum master", "Project manager", "BA", "Architect", "Developer", "QA", "Change manager"] },
            { text: "What reporting or dashboards are required?", placeholder: "More info about reporting needs...", options: ["Status reports", "RAID logs", "Dashboards", "Financial tracking", "Velocity charts", "Burndown charts", "KPI reports"] },
            { text: "What risks, issues, or dependencies need structured oversight?", placeholder: "More info about risks and dependencies...", options: ["Vendor delays", "Resource constraints", "Technical complexity", "Regulatory deadlines", "Data migration", "Integration dependencies"] },
            { text: "What approval gates or checkpoints should exist?", placeholder: "More info about approval gates...", options: ["Business case approval", "Design approval", "Build complete", "Testing complete", "Go-live approval", "Post-go-live review"] },
            { text: "What does “effective governance” look like for your organisation?", placeholder: "More info about effective governance...", options: ["Clear decision rights", "Transparent reporting", "Predictable cadence", "Strong accountability", "Risk visibility", "Stakeholder alignment"] }
        ]
    }
};

let activeFormId = null;
let currentQuestionIndex = 0;
let latestAiOutput = "";
const answers = {};

/*
    QUICK PROTOTYPE ONLY:
    Replace YOUR_OPENAI_API_KEY_HERE with your OpenAI API key.

    Do not use this direct-browser approach with real client, confidential,
    personal, or sensitive data. Move this API call to a backend before using
    it in a real environment.
*/
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY_HERE";
const OPENAI_MODEL = "gpt-4.1-mini";

function openForm(formId) {
    activeFormId = formId;
    currentQuestionIndex = 0;
    latestAiOutput = "";
    if (!answers[formId]) {
        answers[formId] = forms[formId].questions.map(() => ({ selectedOptions: [], notes: "" }));
    }
    resetAiOutput();
    document.getElementById("wizardModal").style.display = "flex";
    renderQuestion();
}

function closeForm() {
    document.getElementById("wizardModal").style.display = "none";
}

function renderQuestion() {
    const form = forms[activeFormId];
    const question = form.questions[currentQuestionIndex];
    const totalQuestions = form.questions.length;
    const savedAnswer = answers[activeFormId][currentQuestionIndex];

    document.getElementById("modalTitle").textContent = form.title;
    document.getElementById("questionCount").textContent = `Question ${currentQuestionIndex + 1} / ${totalQuestions}`;
    document.getElementById("progressBar").style.width = (((currentQuestionIndex + 1) / totalQuestions) * 100) + "%";

    const questionArea = document.getElementById("questionArea");
    let optionsHtml = "";
    if (question.options.length > 0) {
        optionsHtml = `
            <div class="options">
                ${question.options.map(option => {
                    const checked = savedAnswer.selectedOptions.includes(option) ? "checked" : "";
                    return `
                        <label>
                            <input type="checkbox" value="${escapeHtml(option)}" ${checked} onchange="saveCurrentAnswer()">
                            ${escapeHtml(option)}
                        </label>
                    `;
                }).join("")}
            </div>
        `;
    }

    questionArea.innerHTML = `
        <label class="question-title">${currentQuestionIndex + 1}. ${escapeHtml(question.text)}</label>
        ${optionsHtml}
        <textarea id="questionNotes" placeholder="${escapeHtml(question.placeholder)}" oninput="saveCurrentAnswer()">${escapeHtml(savedAnswer.notes)}</textarea>
    `;

    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.onclick = nextQuestion;
    backBtn.disabled = currentQuestionIndex === 0;

    if (currentQuestionIndex === totalQuestions - 1) {
        nextBtn.textContent = "Finish";
        nextBtn.className = "finish-btn";
    } else {
        nextBtn.textContent = "Next";
        nextBtn.className = "next-btn";
    }

    document.querySelector(".modal-content").scrollTop = 0;
}

function saveCurrentAnswer() {
    if (!activeFormId) return;
    const selectedOptions = Array.from(document.querySelectorAll("#questionArea input[type='checkbox']:checked")).map(input => input.value);
    const notesElement = document.getElementById("questionNotes");
    const notes = notesElement ? notesElement.value : "";
    answers[activeFormId][currentQuestionIndex] = { selectedOptions, notes };
}

async function nextQuestion() {
    saveCurrentAnswer();
    const form = forms[activeFormId];
    if (currentQuestionIndex === form.questions.length - 1) {
        await generateAiOutput();
        return;
    }
    currentQuestionIndex++;
    renderQuestion();
}

function previousQuestion() {
    saveCurrentAnswer();
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
    }
}

function escapeHtml(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function resetAiOutput() {
    const aiStatus = document.getElementById("aiStatus");
    const aiOutput = document.getElementById("aiOutput");
    const copyOutputBtn = document.getElementById("copyOutputBtn");
    if (aiStatus) { aiStatus.style.display = "none"; aiStatus.textContent = ""; }
    if (aiOutput) { aiOutput.style.display = "none"; aiOutput.textContent = ""; }
    if (copyOutputBtn) { copyOutputBtn.style.display = "none"; }
}

function setAiStatus(message, isError = false) {
    const aiStatus = document.getElementById("aiStatus");
    if (!aiStatus) return;
    aiStatus.style.display = "block";
    aiStatus.style.borderColor = isError ? "rgba(255,107,107,0.55)" : "rgba(155,199,255,0.25)";
    aiStatus.style.background = isError ? "rgba(255,107,107,0.10)" : "rgba(155,199,255,0.10)";
    aiStatus.textContent = message;
}

function getOutputTypeLabel(formId) {
    const labels = {
        supportModel: "Support Operating Model",
        businessCase: "Business Case",
        maturityAssessment: "Maturity Assessment",
        requirements: "Requirements Pack",
        riskAssessment: "Risk Assessment",
        governance: "Governance Framework"
    };
    return labels[formId] || "Consulting Output";
}

function buildAnsweredQuestionSet() {
    const form = forms[activeFormId];
    const formAnswers = answers[activeFormId];
    return form.questions.map((question, index) => {
        const answer = formAnswers[index] || {};
        return {
            questionNumber: index + 1,
            question: question.text,
            selectedOptions: answer.selectedOptions || [],
            notes: answer.notes || ""
        };
    });
}

function buildAiPrompt() {
    const form = forms[activeFormId];
    const outputType = getOutputTypeLabel(activeFormId);
    const answeredQuestions = buildAnsweredQuestionSet();
    return `
You are an expert management consultant.

Create a polished, structured, client-ready ${outputType} based only on the questionnaire answers provided below.

Output requirements:
- Use clear headings.
- Be specific and practical.
- Do not invent facts that are not supported by the answers.
- If information is missing, include a short "Information gaps / assumptions to validate" section.
- Use concise consulting language.
- Make the output suitable for copying into a slide or Word document.
- Where useful, use tables in markdown.
- Avoid generic filler.

The selected output type is: ${outputType}

Questionnaire title:
${form.title}

Questionnaire answers:
${JSON.stringify(answeredQuestions, null, 2)}

Produce the final ${outputType} now.
`.trim();
}

async function generateAiOutput() {
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    const questionArea = document.getElementById("questionArea");
    const aiOutput = document.getElementById("aiOutput");
    const copyOutputBtn = document.getElementById("copyOutputBtn");

    resetAiOutput();

    if (!OPENAI_API_KEY || OPENAI_API_KEY === "YOUR_OPENAI_API_KEY_HERE") {
        setAiStatus("Add your OpenAI API key in OPENAI_API_KEY before generating an output.", true);
        return;
    }

    try {
        if (nextBtn) { nextBtn.disabled = true; nextBtn.textContent = "Generating..."; }
        if (backBtn) { backBtn.disabled = true; }

        setAiStatus("Generating your consulting output from the completed questionnaire...");
        const prompt = buildAiPrompt();

        const response = await fetch("https://api.openai.com/v1/responses", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                model: OPENAI_MODEL,
                input: prompt,
                temperature: 0.35,
                max_output_tokens: 3500
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`OpenAI API error ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        const generatedText = data.output_text || data.output?.[0]?.content?.[0]?.text || "No output was returned by the API.";
        latestAiOutput = generatedText;

        if (questionArea) {
            questionArea.innerHTML = `<label class="question-title">${escapeHtml(getOutputTypeLabel(activeFormId))} generated</label>`;
        }
        if (aiOutput) {
            aiOutput.style.display = "block";
            aiOutput.textContent = generatedText;
        }
        if (copyOutputBtn) {
            copyOutputBtn.style.display = "inline-block";
        }

        setAiStatus("Output generated successfully.");

        if (nextBtn) {
            nextBtn.textContent = "Done";
            nextBtn.disabled = false;
            nextBtn.onclick = closeForm;
        }
        if (backBtn) {
            backBtn.disabled = false;
        }
    } catch (error) {
        console.error(error);
        setAiStatus("Something went wrong while generating the output. Check the API key, model name, browser console, and whether the API is accessible from this page.", true);
        if (nextBtn) { nextBtn.textContent = "Finish"; nextBtn.disabled = false; }
        if (backBtn) { backBtn.disabled = false; }
    }
}

async function copyAiOutput() {
    if (!latestAiOutput) return;
    try {
        await navigator.clipboard.writeText(latestAiOutput);
        setAiStatus("Output copied to clipboard.");
    } catch (error) {
        console.error(error);
        setAiStatus("Unable to copy automatically. Select the output text and copy it manually.", true);
    }
}

window.onclick = function(event) {
    const modal = document.getElementById("wizardModal");
    if (event.target === modal) closeForm();
};

document.addEventListener("keydown", function(event) {
    const modalIsOpen = document.getElementById("wizardModal").style.display === "flex";
    if (!modalIsOpen) return;
    if (event.key === "Escape") closeForm();
});
</script>
</body>
</html>
