<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #4a6cf7;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: white;
            margin-top: 20px;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            background: #4a6cf7;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #3a56c7;
        }

        footer {
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            color: #777;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Simple Website</h1>
</header>

<main>
    <p>This is a basic single‑file website. You can edit the text, colors, or layout however you like.</p>

    <button onclick="sayHello()">Click Me</button>

    <p id="message" style="margin-top: 20px; font-weight: bold;"></p>
</main>

<footer>
    © 2026 My Simple Website
</footer>

<script>
    function sayHello() {
        document.getElementById("message").textContent = "Hello! Thanks for visiting.";
    }
</script>

</body>
</html>
